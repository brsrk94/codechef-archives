<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My CodeChef Solutions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #fdfbf7;
            color: #2c2c2c;
            padding: 40px 20px;
            line-height: 1.7;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.5em;
            font-weight: normal;
            margin-bottom: 10px;
            text-decoration: underline;
            text-decoration-style: wavy;
            text-decoration-color: #4a90e2;
        }

        .subtitle {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 40px;
            font-style: italic;
        }

        .contest {
            margin-bottom: 50px;
            border-left: 3px solid #4a90e2;
            padding-left: 20px;
        }

        .contest-title {
            font-size: 1.6em;
            margin-bottom: 15px;
            color: #2c2c2c;
        }

        .note {
            background: #fff9e6;
            padding: 15px;
            margin: 15px 0;
            border-left: 4px solid #ffd700;
            font-size: 0.95em;
        }

        .files {
            margin-top: 20px;
        }

        .file-item {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .file-item:hover {
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
            transform: translateX(5px);
        }

        .file-name {
            font-size: 1.1em;
            color: #4a90e2;
            margin-bottom: 8px;
        }

        .file-link {
            color: #4a90e2;
            text-decoration: none;
            font-size: 0.9em;
        }

        .file-link:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #666;
        }

        .error {
            background: #ffe6e6;
            padding: 20px;
            border-left: 4px solid #ff4444;
            margin: 20px 0;
        }

        code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.9em;
        }

        .meta {
            font-size: 0.85em;
            color: #888;
            margin-top: 5px;
        }

        .doodle {
            position: fixed;
            font-size: 3em;
            opacity: 0.05;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="doodle" style="top: 10%; right: 10%;">✨</div>
    <div class="doodle" style="bottom: 15%; left: 8%;">🖊️</div>
    <div class="doodle" style="top: 60%; right: 15%;">📝</div>

    <div class="container">
        <h1>my codechef journey</h1>
        <p class="subtitle">~ a collection of solved problems ~</p>

        <div id="content">
            <div class="loading">loading solutions from github...</div>
        </div>
    </div>

    <script>
        const GITHUB_USER = 'brsrk94';
        const REPO_NAME = 'codechef-archives';
        const API_BASE = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}`;

        async function fetchRepoContents() {
            try {
                const response = await fetch(`${API_BASE}/contents`);
                if (!response.ok) throw new Error('Failed to fetch repository');
                const contents = await response.json();
                
                // Filter for STARTERS folders
                const starterFolders = contents.filter(item => 
                    item.type === 'dir' && item.name.startsWith('STARTERS')
                ).sort((a, b) => {
                    const numA = parseInt(a.name.match(/\d+/)[0]);
                    const numB = parseInt(b.name.match(/\d+/)[0]);
                    return numB - numA; // Sort descending
                });

                return starterFolders;
            } catch (error) {
                console.error('Error fetching repo:', error);
                throw error;
            }
        }

        async function fetchContestFiles(folderPath) {
            try {
                const response = await fetch(`${API_BASE}/contents/${folderPath}`);
                if (!response.ok) throw new Error('Failed to fetch contest files');
                const contents = await response.json();
                
                // Get cpp files and README
                const cppFiles = contents.filter(item => item.name.endsWith('.cpp'));
                const readme = contents.find(item => item.name.toLowerCase().includes('starter') && item.name.endsWith('.md'));
                
                return { cppFiles, readme };
            } catch (error) {
                console.error('Error fetching contest files:', error);
                return { cppFiles: [], readme: null };
            }
        }

        async function fetchReadmeContent(file) {
            if (!file) return null;
            try {
                const response = await fetch(file.download_url);
                if (!response.ok) return null;
                return await response.text();
            } catch (error) {
                return null;
            }
        }

        function extractNotes(readmeContent) {
            if (!readmeContent) return null;
            
            // Try to extract meaningful notes from the README
            const lines = readmeContent.split('\n');
            const notes = [];
            
            for (let line of lines) {
                line = line.trim();
                if (line && !line.startsWith('#') && !line.startsWith('[') && line.length > 20) {
                    notes.push(line);
                    if (notes.length >= 3) break; // Get first 3 meaningful lines
                }
            }
            
            return notes.join(' ');
        }

        async function renderContests() {
            const contentDiv = document.getElementById('content');
            
            try {
                const folders = await fetchRepoContents();
                
                if (folders.length === 0) {
                    contentDiv.innerHTML = '<div class="error">No contest folders found in the repository.</div>';
                    return;
                }

                let html = '';

                for (const folder of folders) {
                    const { cppFiles, readme } = await fetchContestFiles(folder.path);
                    const readmeContent = readme ? await fetchReadmeContent(readme) : null;
                    const notes = extractNotes(readmeContent);

                    html += `
                        <div class="contest">
                            <div class="contest-title">${folder.name.replace('_', ' ')}</div>
                            
                            ${notes ? `<div class="note">${notes}</div>` : ''}
                            
                            <div class="files">
                                ${cppFiles.length > 0 ? 
                                    cppFiles.map(file => `
                                        <div class="file-item" onclick="window.open('${file.html_url}', '_blank')">
                                            <div class="file-name">${file.name}</div>
                                            <a href="${file.html_url}" target="_blank" class="file-link" onclick="event.stopPropagation()">
                                                view solution →
                                            </a>
                                            <div class="meta">
                                                <code>${file.name.replace('.cpp', '')}</code>
                                            </div>
                                        </div>
                                    `).join('') 
                                    : '<p style="color: #888;">No C++ solutions found</p>'
                                }
                            </div>
                        </div>
                    `;
                }

                contentDiv.innerHTML = html;

            } catch (error) {
                contentDiv.innerHTML = `
                    <div class="error">
                        <strong>Oops! Something went wrong.</strong><br>
                        ${error.message}<br><br>
                        Make sure the repository <code>${GITHUB_USER}/${REPO_NAME}</code> exists and is public.
                    </div>
                `;
            }
        }

        // Load contests when page loads
        renderContests();
    </script>
</body>
</html>
