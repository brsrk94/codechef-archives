<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0x4D - CodeChef Archives</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #f5f5f5;
            color: #000;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-size: 3em;
            font-weight: 900;
            margin-bottom: 10px;
            color: #000;
            text-transform: uppercase;
            border: 6px solid #000;
            padding: 20px;
            background: #fff;
            box-shadow: 8px 8px 0 #000;
        }

        .subtitle {
            font-size: 1.1em;
            margin-bottom: 50px;
            padding: 15px;
            border: 3px solid #000;
            background: #fff;
            box-shadow: 6px 6px 0 #000;
            margin-top: 20px;
        }

        .contest {
            margin-bottom: 60px;
            border: 4px solid #000;
            background: #fff;
            padding: 30px;
            box-shadow: 8px 8px 0 #000;
        }

        .contest-title {
            font-size: 2em;
            font-weight: 900;
            margin-bottom: 20px;
            color: #000;
            text-transform: uppercase;
            border-bottom: 4px solid #000;
            padding-bottom: 10px;
        }

        .readme-note {
            margin: 20px 0;
            padding: 20px;
            background: #ffeb3b;
            border: 4px solid #000;
            box-shadow: 4px 4px 0 #000;
            font-weight: 500;
            white-space: pre-wrap;
            line-height: 1.8;
        }

        .readme-note strong {
            font-weight: 900;
        }

        .readme-section {
            margin: 15px 0;
        }

        .readme-section-title {
            font-weight: 900;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .problem-card {
            margin: 30px 0;
            border: 3px solid #000;
            background: #fff;
            padding: 20px;
            box-shadow: 6px 6px 0 #000;
        }

        .problem-name {
            font-size: 1.5em;
            font-weight: 900;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .code-container {
            background: #282c34;
            border: 3px solid #000;
            margin: 15px 0;
            max-height: 400px;
            overflow-y: auto;
        }

        .code-header {
            padding: 10px 15px;
            background: #1e2127;
            color: #abb2bf;
            border-bottom: 2px solid #000;
            font-weight: bold;
        }

        .code-content {
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            line-height: 1.6;
            white-space: pre;
            overflow-x: auto;
            color: #abb2bf;
        }

        /* Syntax highlighting */
        .code-content .keyword { color: #c678dd; }
        .code-content .string { color: #98c379; }
        .code-content .comment { color: #5c6370; font-style: italic; }
        .code-content .number { color: #d19a66; }
        .code-content .function { color: #61afef; }
        .code-content .operator { color: #56b6c2; }
        .code-content .type { color: #e5c07b; }
        .code-content .preprocessor { color: #c678dd; }

        .image-container {
            margin: 25px 0;
            border: 4px solid #000;
            background: #fff;
            padding: 0;
            box-shadow: 6px 6px 0 #000;
        }

        .image-container img {
            max-width: 100%;
            height: auto;
            display: block;
            border-bottom: 3px solid #000;
        }

        .image-caption {
            padding: 10px;
            font-weight: bold;
            background: #fff;
        }

        .expand-btn {
            background: #fff;
            color: #000;
            border: 3px solid #000;
            padding: 10px 25px;
            margin: 15px 0;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 4px 4px 0 #000;
            transition: all 0.1s;
        }

        .expand-btn:hover {
            background: #000;
            color: #fff;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #000;
        }

        .expand-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0 0 0 #000;
        }

        .loading {
            padding: 60px;
            font-size: 1.5em;
            text-align: center;
            font-weight: 900;
            border: 4px solid #000;
            background: #fff;
            box-shadow: 8px 8px 0 #000;
        }

        .error {
            padding: 30px;
            border: 4px solid #000;
            background: #ff6b6b;
            color: #000;
            font-weight: bold;
            box-shadow: 8px 8px 0 #000;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1e2127;
        }

        ::-webkit-scrollbar-thumb {
            background: #3e4451;
            border: 2px solid #1e2127;
        }

        .collapsed {
            max-height: 200px;
            overflow: hidden;
            position: relative;
        }

        .collapsed::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(transparent, #282c34);
        }

        .divider {
            margin: 40px 0;
            height: 4px;
            background: #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CODECHEF</h1>
        <div class="subtitle">COMPETITIVE PROGRAMMING ARCHIVE</div>

        <div id="content">
            <div class="loading">LOADING...</div>
        </div>
    </div>

    <script>
        const GITHUB_USER = 'brsrk94';
        const REPO_NAME = 'codechef-archives';
        const API_BASE = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}`;

        async function fetchRepoContents() {
            try {
                const response = await fetch(`${API_BASE}/contents`);
                if (!response.ok) throw new Error('Failed to fetch repository');
                const contents = await response.json();
                
                const starterFolders = contents.filter(item => 
                    item.type === 'dir' && item.name.startsWith('STARTERS')
                ).sort((a, b) => {
                    const numA = parseInt(a.name.match(/\d+/)[0]);
                    const numB = parseInt(b.name.match(/\d+/)[0]);
                    return numB - numA;
                });

                return starterFolders;
            } catch (error) {
                console.error('Error fetching repo:', error);
                throw error;
            }
        }

        async function fetchContestFiles(folderPath) {
            try {
                const response = await fetch(`${API_BASE}/contents/${folderPath}`);
                if (!response.ok) throw new Error('Failed to fetch contest files');
                const contents = await response.json();
                
                const cppFiles = contents.filter(item => item.name.endsWith('.cpp'));
                const readme = contents.find(item => item.name.toLowerCase() === 'starters.md');
                const imageFolder = contents.find(item => item.type === 'dir' && item.name === 'image');
                
                return { cppFiles, readme, imageFolder };
            } catch (error) {
                console.error('Error fetching contest files:', error);
                return { cppFiles: [], readme: null, imageFolder: null };
            }
        }

        async function fetchImages(imageFolderPath) {
            if (!imageFolderPath) return [];
            try {
                const response = await fetch(`${API_BASE}/contents/${imageFolderPath}`);
                if (!response.ok) return [];
                const contents = await response.json();
                
                let allImages = contents.filter(item => 
                    item.type === 'file' && (
                        item.name.endsWith('.png') || 
                        item.name.endsWith('.jpg') || 
                        item.name.endsWith('.jpeg') ||
                        item.name.endsWith('.gif')
                    )
                );
                
                if (allImages.length === 0) {
                    const subDirs = contents.filter(item => item.type === 'dir');
                    for (const dir of subDirs) {
                        const subResponse = await fetch(`${API_BASE}/contents/${dir.path}`);
                        if (subResponse.ok) {
                            const subContents = await subResponse.json();
                            const subImages = subContents.filter(item =>
                                item.type === 'file' && (
                                    item.name.endsWith('.png') || 
                                    item.name.endsWith('.jpg') || 
                                    item.name.endsWith('.jpeg') ||
                                    item.name.endsWith('.gif')
                                )
                            );
                            allImages = allImages.concat(subImages);
                        }
                    }
                }
                
                return allImages;
            } catch (error) {
                console.error('Error fetching images:', error);
                return [];
            }
        }

        async function fetchFileContent(file) {
            if (!file) return null;
            try {
                const response = await fetch(file.download_url);
                if (!response.ok) return null;
                return await response.text();
            } catch (error) {
                return null;
            }
        }

        function parseReadmeContent(readmeContent) {
            if (!readmeContent) return null;
            
            // Parse markdown-style content
            let parsed = readmeContent
                .replace(/^#+\s+(.+)$/gm, '<div class="readme-section-title">$1</div>')
                .replace(/\[([^\]]+)\]\([^\)]+\)/g, '<strong>$1</strong>')
                .replace(/```[\s\S]*?```/g, '')
                .replace(/`([^`]+)`/g, '<strong>$1</strong>')
                .replace(/^>\s*(.+)$/gm, '<div class="readme-section">→ $1</div>')
                .trim();
            
            return parsed;
        }

        function highlightCppCode(code) {
            // Basic C++ syntax highlighting
            const keywords = /\b(int|void|char|bool|long|short|float|double|class|struct|if|else|for|while|do|switch|case|break|continue|return|sizeof|typedef|const|static|public|private|protected|virtual|namespace|using|template|typename|auto|nullptr|new|delete|try|catch|throw|true|false|cout|cin|endl)\b/g;
            const strings = /("([^"\\]|\\.)*")/g;
            const comments = /(\/\/.*$|\/\*[\s\S]*?\*\/)/gm;
            const numbers = /\b(\d+)\b/g;
            const preprocessor = /^#\s*(include|define|ifdef|ifndef|endif|pragma)\b/gm;
            const functions = /\b([a-zA-Z_][a-zA-Z0-9_]*)\s*(?=\()/g;
            
            let highlighted = code;
            
            // Order matters - do comments first to avoid highlighting inside them
            highlighted = highlighted.replace(comments, '<span class="comment">$1</span>');
            highlighted = highlighted.replace(strings, '<span class="string">$1</span>');
            highlighted = highlighted.replace(preprocessor, '<span class="preprocessor">#$1</span>');
            highlighted = highlighted.replace(keywords, '<span class="keyword">$1</span>');
            highlighted = highlighted.replace(numbers, '<span class="number">$1</span>');
            
            return highlighted;
        }

        function createCodeBlock(filename, code, isCollapsed = true) {
            const id = 'code-' + Math.random().toString(36).substr(2, 9);
            const highlighted = highlightCppCode(escapeHtml(code));
            
            return `
                <div class="code-container ${isCollapsed ? 'collapsed' : ''}" id="${id}">
                    <div class="code-header">${filename}</div>
                    <div class="code-content">${highlighted}</div>
                </div>
                ${isCollapsed ? `<button class="expand-btn" onclick="toggleCode('${id}', this)">EXPAND</button>` : ''}
            `;
        }

        function toggleCode(id, btn) {
            const codeBlock = document.getElementById(id);
            const isCollapsed = codeBlock.classList.contains('collapsed');
            
            if (isCollapsed) {
                codeBlock.classList.remove('collapsed');
                btn.textContent = 'COLLAPSE';
            } else {
                codeBlock.classList.add('collapsed');
                btn.textContent = 'EXPAND';
                codeBlock.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function renderContests() {
            const contentDiv = document.getElementById('content');
            
            try {
                const folders = await fetchRepoContents();
                
                if (folders.length === 0) {
                    contentDiv.innerHTML = '<div class="error">NO CONTESTS FOUND</div>';
                    return;
                }

                let html = '';

                for (const folder of folders) {
                    const { cppFiles, readme, imageFolder } = await fetchContestFiles(folder.path);
                    const readmeContent = readme ? await fetchFileContent(readme) : null;
                    const parsedReadme = parseReadmeContent(readmeContent);
                    const images = imageFolder ? await fetchImages(imageFolder.path) : [];

                    html += `<div class="contest">`;
                    html += `<div class="contest-title">${folder.name.replace(/_/g, ' ')}</div>`;
                    
                    if (parsedReadme) {
                        html += `<div class="readme-note">${parsedReadme}</div>`;
                    }

                    if (images.length > 0) {
                        for (const image of images) {
                            html += `
                                <div class="image-container">
                                    <img src="${image.download_url}" alt="${image.name}" loading="lazy">
                                    <div class="image-caption">${image.name}</div>
                                </div>
                            `;
                        }
                    }

                    if (cppFiles.length > 0) {
                        for (const file of cppFiles) {
                            const code = await fetchFileContent(file);
                            html += `
                                <div class="problem-card">
                                    <div class="problem-name">${file.name.replace('.cpp', '')}</div>
                                    ${code ? createCodeBlock(file.name, code, true) : '<p>CODE NOT AVAILABLE</p>'}
                                </div>
                            `;
                        }
                    } else {
                        html += '<p style="margin: 20px 0; font-weight: bold;">NO SOLUTIONS</p>';
                    }

                    html += `<div class="divider"></div>`;
                    html += `</div>`;
                }

                contentDiv.innerHTML = html;

            } catch (error) {
                contentDiv.innerHTML = `
                    <div class="error">
                        ERROR: ${error.message}
                    </div>
                `;
            }
        }

        window.toggleCode = toggleCode;
        renderContests();
    </script>
</body>
</html>
