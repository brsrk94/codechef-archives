<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My CodeChef Solutions</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Indie+Flower&family=Patrick+Hand&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Indie Flower', cursive;
            background: #ffffff;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 29px,
                    #e3e3e3 29px,
                    #e3e3e3 30px
                );
            color: #1e3a8a;
            padding: 40px 20px;
            line-height: 1.8;
        }

        .paper {
            max-width: 800px;
            margin: 0 auto;
            background: transparent;
            padding: 40px 40px 40px 80px;
            position: relative;
        }

        .paper::before {
            content: '';
            position: absolute;
            left: 50px;
            top: 0;
            bottom: 0;
            width: 1.5px;
            background: #ffc0cb;
        }

        h1 {
            font-family: 'Patrick Hand', cursive;
            font-size: 2.8em;
            font-weight: normal;
            margin-bottom: 8px;
            color: #1e3a8a;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1.1em;
            color: #1e3a8a;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .contest {
            margin-bottom: 50px;
        }

        .contest-title {
            font-family: 'Patrick Hand', cursive;
            font-size: 1.8em;
            margin-bottom: 15px;
            color: #1e3a8a;
            text-decoration: underline;
            text-underline-offset: 5px;
        }

        .note {
            margin: 15px 0;
            padding: 12px 0;
            font-size: 0.95em;
            line-height: 1.6;
            color: #1e3a8a;
            opacity: 0.9;
            border-left: 2px solid #1e3a8a;
            padding-left: 15px;
        }

        .problem-card {
            margin: 30px 0;
            padding-bottom: 20px;
        }

        .problem-name {
            font-family: 'Patrick Hand', cursive;
            font-size: 1.4em;
            color: #1e3a8a;
            margin-bottom: 12px;
        }

        .code-container {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid #cbd5e1;
            margin: 15px 0;
            max-height: 400px;
            overflow-y: auto;
        }

        .code-header {
            padding: 8px 12px;
            border-bottom: 1px solid #cbd5e1;
            font-size: 0.85em;
            color: #64748b;
        }

        .code-content {
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 0.8em;
            line-height: 1.5;
            white-space: pre;
            overflow-x: auto;
            color: #334155;
        }

        .image-container {
            margin: 20px 0;
            padding: 10px;
            border: 1px solid #cbd5e1;
        }

        .image-container img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .image-caption {
            font-size: 0.9em;
            margin-top: 8px;
            color: #1e3a8a;
            opacity: 0.7;
        }

        .expand-btn {
            background: none;
            color: #1e3a8a;
            border: 1px solid #1e3a8a;
            padding: 6px 16px;
            margin: 8px 0;
            cursor: pointer;
            font-family: 'Indie Flower', cursive;
            font-size: 0.9em;
            transition: all 0.2s;
        }

        .expand-btn:hover {
            background: #1e3a8a;
            color: white;
        }

        .loading {
            padding: 40px;
            font-size: 1.2em;
            color: #1e3a8a;
        }

        .error {
            padding: 20px;
            border-left: 3px solid #1e3a8a;
            margin: 20px 0;
            color: #1e3a8a;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
        }

        .collapsed {
            max-height: 180px;
            overflow: hidden;
            position: relative;
        }

        .collapsed::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(transparent, rgba(255, 255, 255, 0.9));
        }

        .divider {
            margin: 30px 0;
            height: 1px;
            background: #cbd5e1;
        }
    </style>
</head>
<body>
    <div class="paper">
        <h1>my codechef journey</h1>
        <p class="subtitle">learning to code, one problem at a time</p>

        <div id="content">
            <div class="loading">loading solutions from github...</div>
        </div>
    </div>

    <script>
        const GITHUB_USER = 'brsrk94';
        const REPO_NAME = 'codechef-archives';
        const API_BASE = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}`;

        async function fetchRepoContents() {
            try {
                const response = await fetch(`${API_BASE}/contents`);
                if (!response.ok) throw new Error('Failed to fetch repository');
                const contents = await response.json();
                
                const starterFolders = contents.filter(item => 
                    item.type === 'dir' && item.name.startsWith('STARTERS')
                ).sort((a, b) => {
                    const numA = parseInt(a.name.match(/\d+/)[0]);
                    const numB = parseInt(b.name.match(/\d+/)[0]);
                    return numB - numA;
                });

                return starterFolders;
            } catch (error) {
                console.error('Error fetching repo:', error);
                throw error;
            }
        }

        async function fetchContestFiles(folderPath) {
            try {
                const response = await fetch(`${API_BASE}/contents/${folderPath}`);
                if (!response.ok) throw new Error('Failed to fetch contest files');
                const contents = await response.json();
                
                const cppFiles = contents.filter(item => item.name.endsWith('.cpp'));
                const readme = contents.find(item => item.name.toLowerCase().includes('starter') && item.name.endsWith('.md'));
                const imageFolder = contents.find(item => item.type === 'dir' && item.name === 'image');
                
                return { cppFiles, readme, imageFolder };
            } catch (error) {
                console.error('Error fetching contest files:', error);
                return { cppFiles: [], readme: null, imageFolder: null };
            }
        }

        async function fetchImages(imageFolderPath) {
            if (!imageFolderPath) return [];
            try {
                const response = await fetch(`${API_BASE}/contents/${imageFolderPath}`);
                if (!response.ok) return [];
                const contents = await response.json();
                return contents.filter(item => 
                    item.name.endsWith('.png') || 
                    item.name.endsWith('.jpg') || 
                    item.name.endsWith('.jpeg') ||
                    item.name.endsWith('.gif')
                );
            } catch (error) {
                console.error('Error fetching images:', error);
                return [];
            }
        }

        async function fetchFileContent(file) {
            if (!file) return null;
            try {
                const response = await fetch(file.download_url);
                if (!response.ok) return null;
                return await response.text();
            } catch (error) {
                return null;
            }
        }

        function extractNotes(readmeContent) {
            if (!readmeContent) return null;
            
            const lines = readmeContent.split('\n');
            const notes = [];
            
            for (let line of lines) {
                line = line.trim();
                if (line && !line.startsWith('#') && !line.startsWith('[') && !line.startsWith('```') && line.length > 15) {
                    notes.push(line);
                    if (notes.length >= 3) break;
                }
            }
            
            return notes.join(' ');
        }

        function createCodeBlock(filename, code, isCollapsed = true) {
            const id = 'code-' + Math.random().toString(36).substr(2, 9);
            return `
                <div class="code-container ${isCollapsed ? 'collapsed' : ''}" id="${id}">
                    <div class="code-header">${filename}</div>
                    <div class="code-content">${escapeHtml(code)}</div>
                </div>
                ${isCollapsed ? `<button class="expand-btn" onclick="toggleCode('${id}', this)">show full code</button>` : ''}
            `;
        }

        function toggleCode(id, btn) {
            const codeBlock = document.getElementById(id);
            const isCollapsed = codeBlock.classList.contains('collapsed');
            
            if (isCollapsed) {
                codeBlock.classList.remove('collapsed');
                btn.textContent = 'hide code';
            } else {
                codeBlock.classList.add('collapsed');
                btn.textContent = 'show full code';
                codeBlock.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function renderContests() {
            const contentDiv = document.getElementById('content');
            
            try {
                const folders = await fetchRepoContents();
                
                if (folders.length === 0) {
                    contentDiv.innerHTML = '<div class="error">No contest folders found in the repository.</div>';
                    return;
                }

                let html = '';

                for (const folder of folders) {
                    const { cppFiles, readme, imageFolder } = await fetchContestFiles(folder.path);
                    const readmeContent = readme ? await fetchFileContent(readme) : null;
                    const notes = extractNotes(readmeContent);
                    const images = imageFolder ? await fetchImages(imageFolder.path) : [];

                    html += `<div class="contest">`;
                    html += `<div class="contest-title">${folder.name.replace(/_/g, ' ')}</div>`;
                    
                    if (notes) {
                        html += `<div class="note">${notes}</div>`;
                    }

                    if (images.length > 0) {
                        for (const image of images) {
                            html += `
                                <div class="image-container">
                                    <img src="${image.download_url}" alt="${image.name}" loading="lazy">
                                    <div class="image-caption">${image.name}</div>
                                </div>
                            `;
                        }
                    }

                    if (cppFiles.length > 0) {
                        for (const file of cppFiles) {
                            const code = await fetchFileContent(file);
                            html += `
                                <div class="problem-card">
                                    <div class="problem-name">${file.name.replace('.cpp', '')}</div>
                                    ${code ? createCodeBlock(file.name, code, true) : '<p style="color: #64748b;">Code not available</p>'}
                                </div>
                            `;
                        }
                    } else {
                        html += '<p style="color: #64748b; margin: 20px 0;">No C++ solutions found</p>';
                    }

                    html += `<div class="divider"></div>`;
                    html += `</div>`;
                }

                contentDiv.innerHTML = html;

            } catch (error) {
                contentDiv.innerHTML = `
                    <div class="error">
                        <strong>Something went wrong.</strong><br>
                        ${error.message}<br><br>
                        Make sure the repository ${GITHUB_USER}/${REPO_NAME} exists and is public.
                    </div>
                `;
            }
        }

        window.toggleCode = toggleCode;
        renderContests();
    </script>
</body>
</html>
