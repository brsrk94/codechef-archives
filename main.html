<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>0x4D - CodeChef Archives</title>

<!-- Handwritten font -->
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
body {
    font-family: "Patrick Hand", cursive;
    background: #faf9f6;
    color: #1e3a8a;
    padding: 40px 20px;
    line-height: 1.8;
}

.container {
    max-width: 900px;
    margin: auto;
}

/* Contest title */
.contest {
    margin-bottom: 80px;
}

.contest-title {
    font-size: 2.3em;
    margin-bottom: 30px;
    border-bottom: 2px solid #1e3a8a;
    padding-bottom: 6px;
}

/* Filename separator */
.filename {
    margin: 35px 0 10px;
    font-size: 1.1em;
    letter-spacing: 0.5px;
}

.filename::before,
.filename::after {
    content: "——";
    margin: 0 10px;
    opacity: 0.6;
}

/* Code */
pre {
    margin: 0 0 30px;
    overflow-x: auto;
}

code {
    font-family: "Courier New", monospace;
    font-size: 0.95em;
    white-space: pre;
    color: #1e3a8a;
}

/* Subtle scrollbar */
::-webkit-scrollbar {
    height: 6px;
}
::-webkit-scrollbar-thumb {
    background: #c7d2fe;
}
</style>
</head>

<body>
<div class="container" id="content">
    loading…
</div>

<script>
const USER = "brsrk94";
const REPO = "codechef-archives";
const API = `https://api.github.com/repos/${USER}/${REPO}`;

async function fetchJSON(url) {
    const r = await fetch(url);
    return r.ok ? r.json() : [];
}

async function fetchText(url) {
    const r = await fetch(url);
    return r.ok ? r.text() : "";
}

async function render() {
    const root = document.getElementById("content");
    root.innerHTML = "";

    const folders = (await fetchJSON(`${API}/contents`))
        .filter(f => f.type === "dir" && f.name.startsWith("STARTERS"))
        .sort((a,b) => b.name.localeCompare(a.name));

    for (const folder of folders) {
        const files = await fetchJSON(`${API}/contents/${folder.path}`);
        const cppFiles = files.filter(f => f.name.endsWith(".cpp"));

        const section = document.createElement("div");
        section.className = "contest";

        const title = document.createElement("div");
        title.className = "contest-title";
        title.textContent = folder.name;
        section.appendChild(title);

        for (const file of cppFiles) {
            const filename = document.createElement("div");
            filename.className = "filename";
            filename.textContent = file.name;
            section.appendChild(filename);

            const codeText = await fetchText(file.download_url);
            const pre = document.createElement("pre");
            const code = document.createElement("code");
            code.textContent = codeText;

            pre.appendChild(code);
            section.appendChild(pre);
        }

        root.appendChild(section);
    }
}

render();
</script>
</body>
</html>
